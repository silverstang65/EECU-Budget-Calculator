<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <a href="index.html" id="income-1">
            <img src="/IMages/images 1.png" alt="EECU Logo">
        </a>
    </nav>
    <section class="net-income">
        <h1>Your current Net Income: <br> (Net)</h1>
        <p>Congrats! Now we have to fill out post-income necessities. Please fill out any expense you must provide:</p>
        <form id="userExpenses">
            <label for="rent">
                <img src="./IMages/Home.svg" alt="Home-Icon">
                Rent/Mortage
            </label>
            <input type="number" name="rent" id="rent" class="expenseFormInput" placeholder="Please enter a mortgage">
            <!--Add Icons via emojis or img tag-->

            <label for="vehicle">
                <img src="./IMages/Car.svg" alt="Home-Icon">
                Vechicle Payment
            </label>
            <input type="number" name="vehicle" id="vehicle" class="expenseFormInput"
                placeholder="Please enter Transportation payments">

            <label for="food">
                <img src="./IMages/Shopping cart.svg" alt="Home-Icon">
                Food/Edibles
            </label>
            <input type="number" name="food" id="food" class="expenseFormInput"
                placeholder="Please enter Food expenses">

            <label for="clothing">
                <img src="./IMages/Clothing.svg" alt="Home-Icon">
                Clothing
            </label>
            <input type="number" name="clothing" id="clothing" class="expenseFormInput"
                placeholder="Please enter Clothing expenses">

            <label for="utilities">
                <img src="./IMages/Utilities.svg" alt="Home-Icon">
                Utilities
            </label>
            <input type="number" name="utilities" id="utilities" class="expenseFormInput"
                placeholder="Please enter Utilities expenses">

            <label for="debt">
                <img src="./IMages/Credit card.svg" alt="Home-Icon">
                Debt(Credit, Student Loans, etc)
            </label>
            <input type="number" name="debt" id="debt" class="expenseFormInput" placeholder="Please enter">
            <!--Continue adding form informatino and labels-->

            <label for="media">
                <img src="./IMages/Media.svg" alt="Home-Icon">
                Media
            </label>
            <input type="number" name="media" id="media" class="expenseFormInput" placeholder="Please enter">

            <label for="entertainment">
                <img src="./IMages/Television.svg" alt="Home-Icon">
                Entertainment
            </label>
            <input type="number" name="entertainment" id="entertainment" class="expenseFormInput"
                placeholder="Please enter">

            <label for="other">
                <img src="./IMages/Other.svg" alt="Home-Icon">
                Other
            </label>
            <input type="number" name="other" id="other" class="expenseFormInput" placeholder="Please enter">
            <!--Last form may require a button & styling for functionality-->
        </form>
    </section>
    <!--Add Done Button-->
</body>

</html>
