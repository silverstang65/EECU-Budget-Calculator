<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <img src="images/images 1.png" alt="EECU Logo">
    </nav>
    <section class="net-income">
        <h1>Your current Net Income: <br> (Net)</h1>
        <p>Congrats! Now we have to fill out post-income necessities. Please fill out any expense you must provide:</p>
        <form id="userExpenses">
            <label for="rent">Rent/Mortage</label>
            <input type="text" name="rent" id="rent" class="expenseFormInput" placeholder="Please enter a mortgage"> <!--Add Icons via emojis or img tag-->

            <label for="vehicle">Vechicle Payment</label>
            <input type="text" name="vehicle" id="vehicle" class="expenseFormInput" placeholder="Please enter Transportation payments">
            
            <label for="food">Food/Edibles</label>
            <input type="text" name="food" id="food" class="expenseFormInput" placeholder="Please enter Food expenses">

            <label for="clothing">Clothing</label>
            <input type="text" name="clothing" id="clothing" class="expenseFormInput" placeholder="Please enter Clothing expenses">

            <label for="utilities">Utilities</label>
            <input type="text" name="utilities" id="utilities" class="expenseFormInput" placeholder="Please enter Utilities expenses">

            <label for="debt">Debt(Credit, Student Loans, etc)</label>
            <input type="text" name="debt" id="debt" class="expenseFormInput" placeholder="Please enter"> <!--Continue adding form informatino and labels-->

            <label for="media">Media</label>
            <input type="text" name="media" id="media" class="expenseFormInput" placeholder="Please enter">

            <label for="entertainment">Entertainment</label>
            <input type="text" name="entertainment" id="entertainment" class="expenseFormInput" placeholder="Please enter">

            <label for="other">Other</label>
            <input type="text" name="other" id="other" class="expenseFormInput" placeholder="Please enter"> <!--Last form may require a button & styling for functionality-->
        </form>
    </section>
    <!--Add Done Button-->
</body>
</html>
